<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>脱了撸 - 发布页</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1b1d2a;
      --muted: #5c627a;
      --primary: #1f6feb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      font-family: "Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
    }
    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }
    .card {
      width: 100%;
      max-width: 680px;
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      padding: 32px;
    }
    h1 {
      margin: 0 0 12px 0;
      font-size: 28px;
    }
    p {
      margin: 0 0 16px 0;
      color: var(--muted);
    }
    .btn {
      display: inline-block;
      padding: 12px 20px;
      background: var(--primary);
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
    }
    .link {
      margin-top: 10px;
      font-size: 14px;
    }
    .link a { color: var(--primary); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>脱了撸 · 发布页</h1>
      <p>请收藏本页，获取最新地址。</p>
      <p>最新地址：<strong>tuolelu.net</strong></p>
      <a class="btn" href="https://tuolelu.net" target="_blank" rel="noreferrer">立即访问</a>
      <div class="link">备用域名：TuoLeLu.com</div>
    </div>
  </div>
</body>
</html>
